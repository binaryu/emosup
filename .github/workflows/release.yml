name: Build and Release

on:
  workflow_dispatch: # Allows manual triggering
  push:
    tags:
      - 'v*' # Triggers on any tag starting with 'v' (e.g., v1.0.0, v1.0.1-beta.1)

jobs:
  build:
    name: Build for ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: windows-latest
            arch: amd64
          # ARM64 build using QEMU
          - os: ubuntu-latest
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # QEMU setup for ARM64 build on x86 runner
      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          $separator = if ($env:RUNNER_OS -eq 'Windows') {';'} else {':'}
          $output_name = "emos-up-${{ runner.os }}-${{ matrix.arch }}"
          python -m PyInstaller --name $output_name --onefile --add-data "app/templates${separator}app/templates" --hidden-import=websockets main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: emos-up-${{ runner.os }}-${{ matrix.arch }}
          path: dist/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/v') # Only run this step for tag pushes
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
          files: |
            artifacts/emos-up-Windows-amd64/emos-up-Windows-amd64.exe
            artifacts/emos-up-Linux-amd64/emos-up-Linux-amd64
            artifacts/emos-up-Linux-arm64/emos-up-Linux-arm64